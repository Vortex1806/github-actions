<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vortex Futuristic UI</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#020617;
    color:#e2e8f0;
    overflow:hidden;
}

canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

header {
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
}

.hero {
    height:60vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size:3rem;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card {
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    transform-style:preserve-3d;
    transition:0.3s;
}

.card:hover {
    transform:rotateY(10deg) rotateX(10deg);
}

.dashboard {
    position:fixed;
    right:0;
    top:0;
    width:300px;
    height:100%;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    padding:20px;
}

.dashboard h3 {
    margin-bottom:20px;
}

.product-page {
    display:none;
    padding:40px;
}

button {
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<header>
<h2>VORTEX</h2>
<button onclick="openAdmin()">Admin</button>
</header>

<div class="hero">
<h1>Futuristic Defense Interface</h1>
</div>

<div class="grid" id="products">
<div class="card" onclick="openProduct('Tank System')">
<h3>Tank System</h3>
<p>Advanced armored simulation</p>
</div>

<div class="card" onclick="openProduct('Missile AI')">
<h3>Missile AI</h3>
<p>Precision targeting simulation</p>
</div>

<div class="card" onclick="openProduct('Jet Control')">
<h3>Jet Control</h3>
<p>Next-gen flight systems</p>
</div>

<div class="card" onclick="openProduct('Bunker Shield')">
<h3>Bunker Shield</h3>
<p>Secure infrastructure simulation</p>
</div>
</div>

<div class="product-page" id="productPage">
<h2 id="productTitle"></h2>
<p>High level futuristic simulation system for portfolio showcase.</p>
<button onclick="closeProduct()">Back</button>
</div>

<div class="dashboard" id="adminPanel" style="display:none;">
<h3>Admin Panel</h3>
<input type="text" id="newProduct" placeholder="New Product" />
<button onclick="addProduct()">Add</button>
</div>

<script>

// PARTICLE BACKGROUND
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<100;i++){
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:1,vy:1});
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;
        if(p.x>canvas.width||p.x<0)p.vx*=-1;
        if(p.y>canvas.height||p.y<0)p.vy*=-1;
        ctx.fillRect(p.x,p.y,2,2);
    });
    requestAnimationFrame(animate);
}
animate();

// PRODUCT PAGE
function openProduct(name){
    document.getElementById('products').style.display='none';
    document.getElementById('productPage').style.display='block';
    document.getElementById('productTitle').innerText=name;
}

function closeProduct(){
    document.getElementById('products').style.display='grid';
    document.getElementById('productPage').style.display='none';
}

// ADMIN PANEL
function openAdmin(){
    const panel = document.getElementById('adminPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function addProduct(){
    const name = document.getElementById('newProduct').value;
    if(!name) return;

    const div = document.createElement('div');
    div.className='card';
    div.innerHTML = `<h3>${name}</h3><p>Custom system</p>`;
    div.onclick = ()=>openProduct(name);

    document.getElementById('products').appendChild(div);
}

</script>

</body>
</html>
