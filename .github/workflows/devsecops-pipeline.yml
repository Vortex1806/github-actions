name: DevSecOps Pipeline

on:
  push:
    branches: [main]

jobs:
  code-quality:
    uses: ./.github/workflows/code-quality.yml
  secrets-scan:
    uses: ./.github/workflows/secrets-scan.yml
  dependency-scan:
    uses: ./.github/workflows/dependencies-scan.yml
  docker-lint:
    uses: ./.github/workflows/docker-lint.yml

  docker-build-push:
    needs: [code-quality, secrets-scan, dependency-scan, docker-lint]
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit
  
  docker-image-scan:
    needs:
      [docker-build-push]
    uses: ./.github/workflows/image-scan.yml
    secrets: inherit

  deploy-to-server:
    needs:
      [docker-image-scan]
    uses: ./.github/workflows/deploy-to-server.yml
    secrets: inherit
    with:
      image_tag: ${{ github.sha }}
